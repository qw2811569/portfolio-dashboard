map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

map $http_origin $cors_allow_origin {
  default "";
  "https://104-199-144-170.sslip.io" $http_origin;
  "https://jiucaivoice-dashboard.vercel.app" $http_origin;
  "https://jiucaivoice.com" $http_origin;
}

limit_req_zone $binary_remote_addr zone=jcv_dev_rate:10m rate=10r/s;

server {
  listen 80;
  listen [::]:80;
  server_name 104-199-144-170.sslip.io;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
  }

  location / {
    return 301 https://104-199-144-170.sslip.io$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name 104-199-144-170.sslip.io;

  ssl_certificate /etc/letsencrypt/live/104-199-144-170.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/104-199-144-170.sslip.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /home/chenkuichen/app/portfolio-dashboard/dist;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location ^~ /assets/ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~* ^/fonts/.*\.woff2$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /api/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Max-Age 86400 always;
      add_header Vary "Origin" always;
      return 204;
    }

    limit_req zone=jcv_dev_rate burst=20 nodelay;
    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin" always;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }
}
