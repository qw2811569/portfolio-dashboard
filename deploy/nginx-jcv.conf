map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  listen [::]:80;
  server_name jiucaivoice.com 35.236.155.62.sslip.io;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name jiucaivoice.com 35.236.155.62.sslip.io;

  # Phase 1 validation still uses sslip.io directly.
  # Keep the currently issued VM cert here; switch to jiucaivoice.com cert in Phase 2.
  ssl_certificate /etc/letsencrypt/live/35.236.155.62.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/35.236.155.62.sslip.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /var/www/app/dist;
  index index.html;

  location = /github/webhook {
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ^~ /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }

  # Agent Bridge currently fetches /api/* and opens WebSocket on / from absolute paths.
  # Directly mounting it under /agent-bridge/ will break unless you also rewrite those paths
  # or patch agent-bridge-standalone/dashboard/index.html.
  #
  # Recommended today:
  # - keep Agent Bridge on the existing sslip root, or
  # - move it to a subdomain later.
  #
  # Example placeholder only; do not enable without fixing the frontend absolute paths first.
  # location = /agent-bridge { return 302 /agent-bridge/; }
  # location ^~ /agent-bridge/ {
  #   rewrite ^/agent-bridge/?(.*)$ /$1 break;
  #   proxy_pass http://127.0.0.1:9527;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection $connection_upgrade;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  #   proxy_set_header X-Real-IP $remote_addr;
  # }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
