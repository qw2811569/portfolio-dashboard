<!doctype html>
<html lang="zh-TW" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>持倉看板</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--app-bg, #f4efe6); }
      #root { min-height: 100vh; }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes indeterminate {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(30%); }
        100% { transform: translateX(100%); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }

      .boot-shell {
        min-height: 100vh;
        padding: 24px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4efe6;
        color: #202823;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .boot-card {
        width: min(560px, 100%);
        padding: 24px 18px;
        border-radius: 28px;
        border: 1px solid rgba(91, 84, 72, 0.16);
        background: linear-gradient(180deg, rgba(243, 234, 223, 0.96), rgba(236, 227, 214, 0.96));
        box-shadow: 0 18px 34px rgba(91, 84, 72, 0.14);
      }

      .boot-chip-row,
      .boot-skeleton-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .boot-chip {
        border-radius: 999px;
        padding: 6px 10px;
        border: 1px solid rgba(91, 84, 72, 0.12);
        background: rgba(243, 234, 223, 0.9);
        color: rgba(91, 84, 72, 0.88);
        font-size: 12px;
      }

      .boot-kicker {
        margin-top: 18px;
        margin-bottom: 10px;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(91, 84, 72, 0.68);
      }

      .boot-title {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: clamp(28px, 4.4vw, 40px);
        line-height: 1.08;
        margin-bottom: 8px;
      }

      .boot-copy {
        font-size: 13px;
        line-height: 1.8;
        color: rgba(56, 62, 57, 0.88);
        margin-bottom: 18px;
      }

      .boot-skeleton {
        display: block;
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(210, 198, 183, 0.92);
        animation: pulse 1.6s ease-in-out infinite;
      }

      .boot-skeleton-circle {
        width: 40px;
        height: 40px;
        border-radius: 999px;
      }

      .boot-skeleton-line {
        height: 12px;
        border-radius: 999px;
      }

      .boot-skeleton-card {
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px;
        margin-top: 12px;
        border-radius: 20px;
        border: 1px solid rgba(91, 84, 72, 0.12);
        background: rgba(243, 234, 223, 0.86);
      }

      .boot-skeleton-copy {
        display: grid;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" data-skeleton="boot-fallback">
        <div class="boot-card">
          <div class="boot-chip-row">
            <span class="boot-chip">持倉</span>
            <span class="boot-chip">事件</span>
            <span class="boot-chip">收盤分析</span>
            <span class="boot-chip">研究</span>
          </div>
          <div class="boot-kicker">Portfolio OS</div>
          <div class="boot-title">正在啟動投組工作台</div>
          <div class="boot-copy">先把主畫面骨架立起來，避免 cold start 直接掉進白屏。</div>
          <div class="boot-skeleton-row">
            <span class="boot-skeleton boot-skeleton-line" style="width: 38%"></span>
            <span class="boot-skeleton boot-skeleton-line" style="width: 62%"></span>
          </div>
          <div class="boot-skeleton-card">
            <span class="boot-skeleton boot-skeleton-circle"></span>
            <div class="boot-skeleton-copy">
              <span class="boot-skeleton boot-skeleton-line" style="width: 34%"></span>
              <span class="boot-skeleton boot-skeleton-line" style="width: 68%"></span>
            </div>
          </div>
          <div class="boot-skeleton-card">
            <span class="boot-skeleton boot-skeleton-circle"></span>
            <div class="boot-skeleton-copy">
              <span class="boot-skeleton boot-skeleton-line" style="width: 28%"></span>
              <span class="boot-skeleton boot-skeleton-line" style="width: 58%"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
