<!doctype html>

    <title>持倉看板</title>
    <style>
      @font-face {
        font-family: 'Source Han Serif TC';
        src: url('/fonts/SourceHanSerifTC-Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
        unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF;
      }

      @font-face {
        font-family: 'Source Han Serif TC';
        src: url('/fonts/SourceHanSerifTC-SemiBold.woff2') format('woff2');

        font-display: swap;
        unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF;
      }

      @font-face {
        font-family: 'Source Han Serif TC';
        src: url('/fonts/SourceHanSerifTC-Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
        unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF;
      }

      @font-face {
        font-family: 'Source Han Sans TC';
        src: url('/fonts/SourceHanSansTC-Regular.woff2') format('woff2');

        font-display: swap;

        unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2E80-2EFF;

      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--app-bg, #283D3B); }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes indeterminate {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(30%); }
        100% { transform: translateX(100%); }
      }
    </style>
