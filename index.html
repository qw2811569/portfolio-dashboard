    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--app-bg, #283D3B); }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }

      }
